<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Resonance Map 3D</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #04080f; font-family: system-ui, sans-serif; color: #e8e8f0; }
  #canvas { position: fixed; inset: 0; }

  /* Top bar */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0; height: 52px;
    display: flex; align-items: center; padding: 0 16px; gap: 10px;
    background: linear-gradient(180deg, rgba(4,8,15,0.95) 0%, transparent 100%);
    z-index: 100; pointer-events: none;
  }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-dot {
    width: 26px; height: 26px; border-radius: 50%;
    border: 1px solid rgba(124,111,255,0.5);
    background: radial-gradient(circle, rgba(124,111,255,0.3), transparent);
    display: flex; align-items: center; justify-content: center;
    animation: pglow 3s ease-in-out infinite;
  }
  @keyframes pglow { 0%,100%{opacity:.5} 50%{opacity:1} }
  .logo-text { font-size: 12px; font-weight: 700; color: #e8e8f0; letter-spacing: .06em; }
  .logo-sub { font-size: 9px; color: #7c6fff; letter-spacing: .18em; font-family: monospace; }

  /* Toolbar buttons */
  #toolbar {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 6px;
    background: rgba(4,8,15,0.9); border: 1px solid rgba(124,111,255,0.2);
    border-radius: 14px; padding: 8px 12px;
    backdrop-filter: blur(16px);
    box-shadow: 0 0 30px rgba(124,111,255,0.1);
    z-index: 100;
  }
  .tbtn {
    background: transparent; border: 1px solid rgba(124,111,255,0.25);
    border-radius: 8px; padding: 6px 12px;
    color: #b8d4ff; font-size: 11px; cursor: pointer;
    font-family: monospace; letter-spacing: .06em;
    display: flex; align-items: center; gap: 5px;
    transition: all .15s; white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .tbtn:hover, .tbtn:active { border-color: #7c6fff; color: #7c6fff; background: rgba(124,111,255,0.1); }
  .tbtn.active { background: rgba(124,111,255,0.2); border-color: #7c6fff; color: #7c6fff; }
  .tsep { width: 1px; height: 20px; background: rgba(124,111,255,0.2); }

  /* Node info panel */
  #info-panel {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: rgba(8,15,30,0.95); border: 1px solid rgba(124,111,255,0.3);
    border-radius: 14px; padding: 14px 18px;
    min-width: 260px; max-width: 340px;
    backdrop-filter: blur(16px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    z-index: 100; display: none;
    animation: fadeIn .15s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateX(-50%) translateY(8px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  .info-label { font-size: 9px; color: #7c6fff; letter-spacing: .15em; font-family: monospace; margin-bottom: 5px; }
  .info-text { font-size: 15px; font-weight: 700; color: #e8e8f0; line-height: 1.3; margin-bottom: 8px; }
  .info-meta { font-size: 10px; color: rgba(184,212,255,0.5); font-family: monospace; }
  .info-note { margin-top: 8px; padding: 6px 8px; background: rgba(255,255,255,0.04); border-radius: 6px; border-left: 2px solid rgba(124,111,255,0.5); font-size: 11px; color: #b8d4ff; line-height: 1.45; }
  .info-provoke { margin-top: 8px; padding: 6px 8px; background: rgba(0,220,255,0.06); border-radius: 6px; border-left: 2px solid rgba(0,220,255,0.5); font-size: 11px; color: #00e5ff; line-height: 1.45; }
  #info-close { position: absolute; top: 10px; right: 12px; background: none; border: none; color: rgba(255,255,255,0.3); cursor: pointer; font-size: 16px; line-height: 1; }

  /* Loading */
  #loading {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; z-index: 200;
    background: #04080f;
  }
  #loading .spinner {
    width: 40px; height: 40px; border-radius: 50%;
    border: 2px solid rgba(124,111,255,0.2);
    border-top-color: #7c6fff;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { font-size: 12px; color: rgba(184,212,255,0.6); font-family: monospace; letter-spacing: .1em; }

  /* Drop zone */
  #dropzone {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; z-index: 50;
    gap: 16px;
  }
  .drop-box {
    border: 2px dashed rgba(124,111,255,0.4); border-radius: 16px;
    padding: 32px 40px; text-align: center; cursor: pointer;
    transition: all .2s; max-width: 320px;
  }
  .drop-box:hover { border-color: #7c6fff; background: rgba(124,111,255,0.05); }
  .drop-icon { font-size: 32px; margin-bottom: 12px; }
  .drop-title { font-size: 14px; font-weight: 700; color: #e8e8f0; margin-bottom: 6px; }
  .drop-sub { font-size: 11px; color: rgba(184,212,255,0.5); font-family: monospace; }
  .back-btn {
    background: rgba(124,111,255,0.1); border: 1px solid rgba(124,111,255,0.3);
    border-radius: 8px; padding: 8px 16px; color: #7c6fff;
    font-size: 11px; cursor: pointer; font-family: monospace; letter-spacing: .06em;
  }

  /* Hint */
  #hint {
    position: fixed; top: 60px; left: 16px;
    font-size: 10px; color: rgba(184,212,255,0.22);
    font-family: monospace; letter-spacing: .08em; line-height: 2;
    pointer-events: none; z-index: 100;
  }

  /* mode badge */
  #mode-badge {
    position: fixed; top: 14px; right: 16px;
    font-size: 9px; font-family: monospace; letter-spacing: .12em;
    padding: 4px 10px; border-radius: 6px;
    border: 1px solid rgba(124,111,255,0.3);
    color: rgba(124,111,255,0.8);
    background: rgba(124,111,255,0.08);
    z-index: 100;
  }

  input[type=file] { display: none; }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>LOADING 3D ENGINE…</p>
</div>

<canvas id="canvas"></canvas>

<!-- Top bar -->
<div id="topbar">
  <div class="logo">
    <div class="logo-dot">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#7c6fff" stroke-width="2.5">
        <path d="M6 3v12M18 9v12M6 15a6 6 0 0 0 12 0M6 3a6 6 0 0 0 12 0"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">RESONANCE MAP 3D</div>
      <div class="logo-sub" id="node-count">— nodes</div>
    </div>
  </div>
</div>

<div id="mode-badge">DEPTH VIEW</div>

<!-- Hint -->
<div id="hint">
  <div>DRAG → 回転</div>
  <div>PINCH → ズーム</div>
  <div>TAP → ノード詳細</div>
  <div>DBL-TAP → フォーカス</div>
</div>

<!-- Node info panel -->
<div id="info-panel">
  <button id="info-close" onclick="closeInfo()">×</button>
  <div class="info-label" id="info-label">NODE</div>
  <div class="info-text" id="info-text"></div>
  <div class="info-meta" id="info-meta"></div>
  <div id="info-note"></div>
  <div id="info-provoke"></div>
</div>

<!-- Bottom toolbar -->
<div id="toolbar">
  <button class="tbtn" onclick="resetCamera()">⊙ リセット</button>
  <div class="tsep"></div>
  <button class="tbtn active" id="btn-depth" onclick="toggleColorMode('depth')">◉ 深度</button>
  <button class="tbtn" id="btn-provoke" onclick="toggleColorMode('provoke')">⚡ Provoke</button>
  <div class="tsep"></div>
  <button class="tbtn" onclick="document.getElementById('file-input').click()">↑ JSON読込</button>
  <button class="tbtn" onclick="goBack()">← 2D</button>
</div>

<!-- Drop zone (shown when no data) -->
<div id="dropzone">
  <div class="drop-box" onclick="document.getElementById('file-input').click()"
    ondragover="event.preventDefault()" ondrop="onFileDrop(event)">
    <div class="drop-icon">🧠</div>
    <div class="drop-title">マップを読み込む</div>
    <div class="drop-sub">JSONファイルをドロップ<br>またはタップして選択</div>
  </div>
  <button class="back-btn" onclick="goBack()">← 2Dマップに戻る</button>
</div>

<input type="file" id="file-input" accept=".json" onchange="onFileSelect(event)">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ══════════════════════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════════════════════
const DEPTH_COLORS = [
  0x7c6fff, // depth 0 - root: purple
  0x0078ff, // depth 1: blue
  0x6bffcb, // depth 2: mint
  0xffbb6b, // depth 3: amber
  0xff6b9d, // depth 4: pink
  0x6bb8ff, // depth 5+: light blue
]
const PROVOKE_COLOR = 0x00e5ff
const EDGE_COLOR    = 0x2a3a6a
const EDGE_PROVOKE  = 0x00aacc
const Z_STEP = 160      // Z gap per depth level
const SPREAD = 280      // XY spread per depth level

// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
let scene, camera, renderer, raycaster, mouse
let mapData = null
let nodeMeshes = []   // { mesh, node, depth }
let edgeLines = []
let colorMode = 'depth'
let animFrame = null

// Camera control
let isDragging = false, isTouch = false
let prevMouse = { x: 0, y: 0 }
let spherical = { theta: 0, phi: Math.PI / 2.5, r: 700 }
let targetSpherical = { ...spherical }
let targetLookAt = new THREE.Vector3(0, 0, 0)
let currentLookAt = new THREE.Vector3(0, 0, 0)

// Pinch
let pinchDist0 = 0, pinchR0 = 0

// ══════════════════════════════════════════════════════════════
// INIT THREE.JS
// ══════════════════════════════════════════════════════════════
function initThree() {
  const canvas = document.getElementById('canvas')
  scene = new THREE.Scene()
  scene.background = new THREE.Color(0x04080f)
  scene.fog = new THREE.FogExp2(0x04080f, 0.0008)

  camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 1, 8000)
  updateCameraFromSpherical()

  renderer = new THREE.WebGLRenderer({ canvas, antialias: true })
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2))
  renderer.setSize(innerWidth, innerHeight)

  // Lighting
  const ambient = new THREE.AmbientLight(0xffffff, 0.4)
  scene.add(ambient)
  const dir = new THREE.DirectionalLight(0x8899ff, 1.2)
  dir.position.set(1, 2, 3)
  scene.add(dir)
  const pt = new THREE.PointLight(0x7c6fff, 2, 1200)
  pt.position.set(0, 200, 300)
  scene.add(pt)

  // Grid
  const grid = new THREE.GridHelper(2000, 40, 0x111128, 0x0a0a1a)
  grid.position.y = -200
  scene.add(grid)

  raycaster = new THREE.Raycaster()
  raycaster.params.Points.threshold = 10

  setupEvents()
  animate()

  document.getElementById('loading').style.display = 'none'
}

// ══════════════════════════════════════════════════════════════
// BUILD MAP
// ══════════════════════════════════════════════════════════════
function buildMap(data) {
  // Clear previous
  nodeMeshes.forEach(o => scene.remove(o.mesh))
  edgeLines.forEach(l => scene.remove(l))
  nodeMeshes = []; edgeLines = []

  const nodes = data.nodes || []
  const edges = data.edges || []

  // Assign depths via BFS from root
  const nodeMap = Object.fromEntries(nodes.map(n => [n.id, n]))
  const depthMap = {}
  const root = nodes.find(n => n.isRoot) || nodes[0]
  if (!root) return

  const queue = [{ id: root.id, depth: 0 }]
  const visited = new Set()
  while (queue.length) {
    const { id, depth } = queue.shift()
    if (visited.has(id)) continue
    visited.add(id); depthMap[id] = depth
    edges.filter(e => e.from === id && !visited.has(e.to)).forEach(e => queue.push({ id: e.to, depth: depth + 1 }))
    edges.filter(e => e.to === id && !visited.has(e.from)).forEach(e => queue.push({ id: e.from, depth: depth + 1 }))
  }
  // unvisited nodes
  nodes.forEach(n => { if (depthMap[n.id] === undefined) depthMap[n.id] = 3 })

  // Position: Z = depth * Z_STEP, XY = original 2D position scaled + slight random
  const positions = {}
  nodes.forEach(n => {
    const depth = depthMap[n.id] || 0
    positions[n.id] = new THREE.Vector3(
      n.x * 0.6 + (Math.random() - 0.5) * 20,
      -n.y * 0.6 + (Math.random() - 0.5) * 20,  // flip Y
      -depth * Z_STEP
    )
  })

  // Create node meshes
  nodes.forEach(n => {
    const depth = depthMap[n.id] || 0
    const pos = positions[n.id]
    const isRoot = n.isRoot
    const isProvoked = n.provoked && n.provokeData

    // Geometry: root = icosahedron, provoked = octahedron, normal = sphere
    let geo
    if (isRoot) geo = new THREE.IcosahedronGeometry(18, 1)
    else if (isProvoked) geo = new THREE.OctahedronGeometry(11, 0)
    else geo = new THREE.SphereGeometry(isRoot ? 16 : 9, 16, 16)

    const colorIdx = Math.min(depth, DEPTH_COLORS.length - 1)
    const color = isProvoked ? PROVOKE_COLOR : DEPTH_COLORS[colorIdx]

    const mat = new THREE.MeshPhongMaterial({
      color,
      emissive: color,
      emissiveIntensity: isRoot ? 0.4 : 0.15,
      shininess: 80,
      transparent: true,
      opacity: 0.92,
    })

    const mesh = new THREE.Mesh(geo, mat)
    mesh.position.copy(pos)
    mesh.userData = { nodeId: n.id, depth }
    scene.add(mesh)

    // Glow ring for root
    if (isRoot) {
      const ringGeo = new THREE.TorusGeometry(24, 1.5, 8, 32)
      const ringMat = new THREE.MeshBasicMaterial({ color: 0x7c6fff, transparent: true, opacity: 0.4 })
      const ring = new THREE.Mesh(ringGeo, ringMat)
      ring.rotation.x = Math.PI / 2
      ring.position.copy(pos)
      scene.add(ring)
    }

    // Label sprite
    const sprite = makeLabel(n.text, color)
    sprite.position.copy(pos)
    sprite.position.y += isRoot ? 28 : 18
    scene.add(sprite)

    nodeMeshes.push({ mesh, sprite, node: n, depth, pos, color })
  })

  // Create edges
  const mat = new THREE.LineBasicMaterial({ color: EDGE_COLOR, transparent: true, opacity: 0.5 })
  edges.forEach(e => {
    const a = positions[e.from], b = positions[e.to]
    if (!a || !b) return
    const fromNode = nodeMap[e.from], toNode = nodeMap[e.to]
    const isProvoked = fromNode?.provoked || toNode?.provoked
    const edgeMat = new THREE.LineBasicMaterial({
      color: isProvoked ? EDGE_PROVOKE : EDGE_COLOR,
      transparent: true, opacity: isProvoked ? 0.7 : 0.4,
    })

    // Curved edge using QuadraticBezierCurve3
    const mid = new THREE.Vector3().addVectors(a, b).multiplyScalar(0.5)
    mid.x += (Math.random() - 0.5) * 40
    mid.y += (Math.random() - 0.5) * 40
    const curve = new THREE.QuadraticBezierCurve3(a, mid, b)
    const pts = curve.getPoints(20)
    const geo = new THREE.BufferGeometry().setFromPoints(pts)
    const line = new THREE.Line(geo, edgeMat)
    scene.add(line)
    edgeLines.push(line)
  })

  // Update UI
  document.getElementById('node-count').textContent = `${nodes.length} nodes`
  document.getElementById('dropzone').style.display = 'none'

  // Focus on root
  const rootPos = positions[root.id]
  if (rootPos) {
    targetLookAt.copy(rootPos)
    targetSpherical.r = 700
  }
}

// ══════════════════════════════════════════════════════════════
// LABEL SPRITE
// ══════════════════════════════════════════════════════════════
function makeLabel(text, color) {
  const canvas = document.createElement('canvas')
  canvas.width = 256; canvas.height = 64
  const ctx = canvas.getContext('2d')
  const hex = '#' + color.toString(16).padStart(6, '0')
  ctx.fillStyle = 'rgba(0,0,0,0)'
  ctx.fillRect(0, 0, 256, 64)
  ctx.font = '500 18px system-ui'
  ctx.fillStyle = hex
  ctx.textAlign = 'center'
  ctx.textBaseline = 'middle'
  const label = text.length > 14 ? text.slice(0, 14) + '…' : text
  ctx.fillText(label, 128, 32)
  const tex = new THREE.CanvasTexture(canvas)
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0.85 })
  const sprite = new THREE.Sprite(mat)
  sprite.scale.set(80, 20, 1)
  return sprite
}

// ══════════════════════════════════════════════════════════════
// COLOR MODE
// ══════════════════════════════════════════════════════════════
function toggleColorMode(mode) {
  colorMode = mode
  document.getElementById('btn-depth').classList.toggle('active', mode === 'depth')
  document.getElementById('btn-provoke').classList.toggle('active', mode === 'provoke')
  nodeMeshes.forEach(({ mesh, node, depth }) => {
    let color
    if (mode === 'provoke') {
      color = (node.provoked && node.provokeData) ? PROVOKE_COLOR : 0x1a2040
    } else {
      const idx = Math.min(depth, DEPTH_COLORS.length - 1)
      color = (node.provoked && node.provokeData) ? PROVOKE_COLOR : DEPTH_COLORS[idx]
    }
    mesh.material.color.setHex(color)
    mesh.material.emissive.setHex(color)
  })
}

// ══════════════════════════════════════════════════════════════
// ANIMATE
// ══════════════════════════════════════════════════════════════
function animate() {
  animFrame = requestAnimationFrame(animate)

  // Smooth camera
  spherical.theta += (targetSpherical.theta - spherical.theta) * 0.08
  spherical.phi   += (targetSpherical.phi   - spherical.phi)   * 0.08
  spherical.r     += (targetSpherical.r     - spherical.r)     * 0.08
  currentLookAt.lerp(targetLookAt, 0.06)

  // Float animation for nodes
  const t = Date.now() * 0.0008
  nodeMeshes.forEach(({ mesh, sprite, depth }, i) => {
    const offset = i * 0.4
    const floatY = Math.sin(t + offset) * 3
    mesh.position.y = mesh.userData.baseY !== undefined
      ? mesh.userData.baseY + floatY
      : (() => { mesh.userData.baseY = mesh.position.y; return mesh.position.y + floatY })()
    if (sprite) sprite.position.y = mesh.position.y + (depth === 0 ? 28 : 18)
    mesh.rotation.y = t * 0.2 + offset
  })

  updateCameraFromSpherical()
  renderer.render(scene, camera)
}

function updateCameraFromSpherical() {
  if (!camera) return
  const { theta, phi, r } = spherical
  camera.position.set(
    currentLookAt.x + r * Math.sin(phi) * Math.sin(theta),
    currentLookAt.y + r * Math.cos(phi),
    currentLookAt.z + r * Math.sin(phi) * Math.cos(theta),
  )
  camera.lookAt(currentLookAt)
}

// ══════════════════════════════════════════════════════════════
// EVENTS
// ══════════════════════════════════════════════════════════════
function setupEvents() {
  const canvas = document.getElementById('canvas')

  // Mouse
  canvas.addEventListener('mousedown', e => { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY } })
  window.addEventListener('mouseup', () => isDragging = false)
  window.addEventListener('mousemove', e => {
    if (!isDragging) return
    const dx = (e.clientX - prevMouse.x) / innerWidth
    const dy = (e.clientY - prevMouse.y) / innerHeight
    targetSpherical.theta -= dx * 3
    targetSpherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, targetSpherical.phi + dy * 3))
    prevMouse = { x: e.clientX, y: e.clientY }
  })
  canvas.addEventListener('wheel', e => {
    e.preventDefault()
    targetSpherical.r = Math.max(80, Math.min(3000, targetSpherical.r * (e.deltaY > 0 ? 1.1 : 0.9)))
  }, { passive: false })
  canvas.addEventListener('click', onCanvasClick)
  canvas.addEventListener('dblclick', onCanvasDblClick)

  // Touch
  let lastTap = 0
  canvas.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      isDragging = true
      prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY }
      const now = Date.now()
      if (now - lastTap < 300) onCanvasDblClick(e.touches[0])
      lastTap = now
    } else if (e.touches.length === 2) {
      isDragging = false
      pinchDist0 = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      )
      pinchR0 = targetSpherical.r
    }
  }, { passive: true })

  canvas.addEventListener('touchmove', e => {
    e.preventDefault()
    if (e.touches.length === 1 && isDragging) {
      const dx = (e.touches[0].clientX - prevMouse.x) / innerWidth
      const dy = (e.touches[0].clientY - prevMouse.y) / innerHeight
      targetSpherical.theta -= dx * 3.5
      targetSpherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, targetSpherical.phi + dy * 3.5))
      prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY }
    } else if (e.touches.length === 2) {
      const d = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      )
      targetSpherical.r = Math.max(80, Math.min(3000, pinchR0 * (pinchDist0 / d)))
    }
  }, { passive: false })

  canvas.addEventListener('touchend', e => { if (e.touches.length === 0) isDragging = false })

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight
    camera.updateProjectionMatrix()
    renderer.setSize(innerWidth, innerHeight)
  })
}

function getIntersects(clientX, clientY) {
  mouse = new THREE.Vector2(
    (clientX / innerWidth) * 2 - 1,
    -(clientY / innerHeight) * 2 + 1
  )
  raycaster.setFromCamera(mouse, camera)
  return raycaster.intersectObjects(nodeMeshes.map(o => o.mesh))
}

function onCanvasClick(e) {
  const hits = getIntersects(e.clientX, e.clientY)
  if (!hits.length) { closeInfo(); return }
  const hit = hits[0]
  const obj = nodeMeshes.find(o => o.mesh === hit.object)
  if (obj) showInfo(obj)
}

function onCanvasDblClick(e) {
  const hits = getIntersects(e.clientX || e.clientX, e.clientY || e.clientY)
  if (!hits.length) return
  const hit = hits[0]
  const obj = nodeMeshes.find(o => o.mesh === hit.object)
  if (obj) {
    targetLookAt.copy(obj.pos || obj.mesh.position)
    targetSpherical.r = 280
  }
}

// ══════════════════════════════════════════════════════════════
// INFO PANEL
// ══════════════════════════════════════════════════════════════
function showInfo(obj) {
  const { node, depth } = obj
  const panel = document.getElementById('info-panel')
  document.getElementById('info-label').textContent = node.isRoot ? 'ROOT NODE' : `DEPTH ${depth}`
  document.getElementById('info-text').textContent = node.text
  document.getElementById('info-meta').textContent =
    `depth: ${depth}${node.provoked ? '  ·  ⚡ provoked' : ''}${node.note ? '  ·  📝 memo' : ''}`

  const noteEl = document.getElementById('info-note')
  noteEl.innerHTML = node.note
    ? `<div class="info-note">${node.note}</div>` : ''

  const provEl = document.getElementById('info-provoke')
  if (node.provoked && node.provokeData) {
    const pd = node.provokeData
    if (pd.mode === 'dual') {
      provEl.innerHTML = `
        <div class="info-provoke" style="border-color:rgba(0,120,255,0.5);color:#00e5ff;margin-top:6px">
          <span style="font-size:9px;font-family:monospace;color:#0078ff;font-weight:700">BUSINESS</span><br>${pd.business?.text || ''}
        </div>
        <div class="info-provoke" style="margin-top:4px">
          <span style="font-size:9px;font-family:monospace;color:#c8a96e;font-weight:700">PHILOSOPHY</span><br>${pd.philosophy?.text || ''}
        </div>`
    } else {
      provEl.innerHTML = `<div class="info-provoke" style="margin-top:6px">${pd.text || ''}</div>`
    }
  } else {
    provEl.innerHTML = ''
  }

  panel.style.display = 'block'
}

function closeInfo() {
  document.getElementById('info-panel').style.display = 'none'
}

// ══════════════════════════════════════════════════════════════
// CAMERA RESET
// ══════════════════════════════════════════════════════════════
function resetCamera() {
  targetSpherical = { theta: 0, phi: Math.PI / 2.5, r: 700 }
  targetLookAt.set(0, 0, 0)
}

// ══════════════════════════════════════════════════════════════
// FILE LOAD
// ══════════════════════════════════════════════════════════════
function loadJSON(data) {
  mapData = data
  buildMap(data)
}

function onFileSelect(e) {
  const file = e.target.files[0]; if (!file) return
  const reader = new FileReader()
  reader.onload = ev => {
    try { loadJSON(JSON.parse(ev.target.result)) }
    catch { alert('読み込みエラー') }
  }
  reader.readAsText(file)
  e.target.value = ''
}

function onFileDrop(e) {
  e.preventDefault()
  const file = e.dataTransfer.files[0]; if (!file) return
  const reader = new FileReader()
  reader.onload = ev => {
    try { loadJSON(JSON.parse(ev.target.result)) }
    catch { alert('読み込みエラー') }
  }
  reader.readAsText(file)
}

function goBack() {
  window.location.href = '../'
}

// ══════════════════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════════════════
window.addEventListener('load', () => {
  initThree()

  // Try loading from localStorage (passed from 2D map)
  try {
    const raw = localStorage.getItem('resonance-map:3d-transfer')
    if (raw) {
      localStorage.removeItem('resonance-map:3d-transfer')
      loadJSON(JSON.parse(raw))
      return
    }
  } catch {}

  // Try URL param
  const params = new URLSearchParams(location.search)
  const mapId = params.get('map')
  if (mapId) {
    try {
      const all = JSON.parse(localStorage.getItem('resonance-map:maps') || '{}')
      if (all[mapId]) { loadJSON(all[mapId]); return }
    } catch {}
  }

  // Show drop zone
  document.getElementById('dropzone').style.display = 'flex'
})
</script>
</body>
</html>
